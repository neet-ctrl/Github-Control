name: Build Debug APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "Found APK at $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: github-control-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH="${{ steps.apk.outputs.path }}"
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
          echo "apk_size=$APK_SIZE_MB MB" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        run: |
          DATE=$(date +'%B %d, %Y')
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)

          RELEASE_BODY="## 🐙 GitHub Control v$VERSION (Debug)

          **Release Date:** $DATE

          ### 📱 What's New
          - Latest development build straight from \`main\`
          - Includes all recent features, fixes and improvements
          - Debug build for testing and previewing changes early

          ### 📦 Package Details
          - **Version:** $VERSION
          - **Build Type:** Debug
          - **File Size:** ${{ steps.apk-info.outputs.apk_size }}
          - **Platform:** Android 8.0+ (API 26+)
          - **Commit:** \`${{ github.sha }}\`

          ### 🚀 Features
          - Browse, create, fork and manage repositories on multiple GitHub accounts
          - Full Issues, Pull Requests, Releases, Actions and Notifications support
          - Inline file editor with syntax highlighting and Markdown preview
          - Branch management — create, rename, delete, set default, hard-reset
          - Commit explorer with side-by-side diffs and per-commit actions
          - User profile screen with public repo browsing
          - Built-in JGit terminal mode and folder-sync to a chosen storage tree

          ### ⚠️ Important Notes
          - This is a debug build intended for testing
          - Enable \"Install from Unknown Sources\" on your device
          - Grant storage and notification permissions when prompted

          ### 📥 Installation
          1. Download the APK file below
          2. Enable installation from unknown sources for your browser/file manager
          3. Install and sign in with your GitHub Personal Access Token

          ---
          **Repository:** [GitHub](https://github.com/${{ github.repository }})"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: success() && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-debug
          name: GitHub Control Debug Build ${{ github.run_number }}
          body: ${{ steps.release-notes.outputs.body }}
          files: |
            ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
